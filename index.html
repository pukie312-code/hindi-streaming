<script>
    const KEY = 'YOUR_TMDB_API_KEY'; 
    const DUBBED_KEYWORD = '250227'; // TMDB's internal ID for Hindi Dubbed movies

    // 1. Home Screen: Shows ONLY Hindi Dubbed Global Movies
    async function loadHome() {
        // This 'discover' call specifically asks for movies with the Hindi Dubbed keyword
        const url = `https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_keywords=${DUBBED_KEYWORD}&sort_by=popularity.desc&language=hi-IN`;
        const r = await fetch(url);
        const d = await r.json();
        render(d.results);
    }

    // 2. Search: Specifically looks for Hindi versions
    async function search() {
        const q = document.getElementById('query').value;
        if(!q) return;
        // Search using the Hindi language locale to find the dubbed metadata
        const r = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=${encodeURIComponent(q)}&language=hi-IN&include_adult=false`);
        const d = await r.json();
        render(d.results);
    }

    function render(movies) {
        const display = document.getElementById('display');
        display.innerHTML = movies.map(m => `
            <div class="card" onclick="playMovie('${m.id}', '${m.title}')">
                <div class="dub-badge">HINDI DUBBED</div>
                <img src="https://image.tmdb.org/t/p/w300${m.poster_path}" onerror="this.src='https://via.placeholder.com/300x450?text=Hindi+Dubbed'">
                <p>${m.title}</p>
            </div>
        `).join('');
    }

    async function playMovie(id, title) {
        const box = document.getElementById('player-box');
        const frame = document.getElementById('video-frame');
        
        box.style.display = 'block';
        document.getElementById('playing-title').innerText = "Loading Dubbed: " + title;

        // Fetch the IMDb ID (Crucial for HDHub-style sources)
        const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}`);
        const data = await res.json();
        const imdb = data.imdb_id;

        // Use the 'SuperEmbed' source - it is currently the best for Hindi/English Dual Audio
        // It automatically searches for the dubbed file if available
        frame.src = `https://multiembed.mov/?video_id=${imdb || id}`;

        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function closeVideo() {
        document.getElementById('player-box').style.display = 'none';
        document.getElementById('video-frame').src = "";
    }

    loadHome();
</script>
