<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieSite | Simple & Fast</title>
    <style>
        /* CSS: Keeping it clean and static */
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        
        .nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input { flex-grow: 1; padding: 10px; border-radius: 4px; border: 1px solid #333; background: #111; color: #fff; }
        button { padding: 10px 20px; background: #e50914; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-gray { background: #333; }

        #player-box { display: none; background: #111; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        .iframe-wrapper { position: relative; padding-top: 56.25%; width: 100%; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: #111; border: 1px solid #222; border-radius: 5px; cursor: pointer; text-align: center; font-size: 13px; }
        .card img { width: 100%; border-radius: 5px 5px 0 0; display: block; }
        .card p { padding: 8px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <div class="nav">
        <input type="text" id="query" placeholder="Search movie name...">
        <button onclick="search()">Search</button>
        <button class="btn-gray" onclick="loadTrending()">Home</button>
    </div>

    <div id="player-box">
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
            <span id="playing-title">Playing...</span>
            <button onclick="closeVideo()" style="padding: 2px 10px;">X Close</button>
        </div>
        <div class="iframe-wrapper">
            <iframe id="video-frame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div class="grid" id="display"></div>

    <script>
        // REPLACE 'YOUR_KEY_HERE' WITH YOUR TMDB API KEY
        const KEY = '2ceab4da8be54076a608de05a598d634'; 
        const display = document.getElementById('display');
        const frame = document.getElementById('video-frame');
        const box = document.getElementById('player-box');
        const pTitle = document.getElementById('playing-title');

        // Load Trending movies on startup
        async function loadTrending() {
            const r = await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${KEY}`);
            const d = await r.json();
            render(d.results);
        }

        // Search movies
        async function search() {
            const q = document.getElementById('query').value;
            if(!q) return;
            const r = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=${q}`);
            const d = await r.json();
            render(d.results);
        }

        // Draw the movie cards
        function render(movies) {
            display.innerHTML = movies.map(m => `
                <div class="card" onclick="play('${m.id}', '${m.title.replace(/'/g, "")}')">
                    <img src="https://image.tmdb.org/t/p/w300${m.poster_path}" alt="img">
                    <p>${m.title}</p>
                </div>
            `).join('');
        }

        // Play video
        function play(id, title) {
            box.style.display = 'block';
            pTitle.innerText = "Watching: " + title;
            frame.src = `https://vidsrc.to/embed/movie/${id}`;
            window.scrollTo({top: 0});
        }

        // Close video
        function closeVideo() {
            box.style.display = 'none';
            frame.src = "";
        }

        loadTrending();
    </script>
</body>
</html>
