<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream PRO | Strict Hindi Dubbed</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --main-red: #e50914; --bg-black: #0a0a0a; --sidebar-bg: #111; --card-bg: #181818; }
        body { background-color: var(--bg-black); color: white; font-family: 'Roboto', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar-bg); padding: 20px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid #222; overflow-y: auto; box-sizing: border-box; }
        .logo { color: var(--main-red); font-size: 22px; font-weight: bold; text-align: center; text-decoration: none; letter-spacing: 1px; }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        select, input { background: #222; color: white; border: 1px solid #333; padding: 10px; border-radius: 5px; outline: none; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--main-red); }
        
        /* MAIN CONTENT */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: radial-gradient(circle at top right, #1a1a1a, #0a0a0a); }
        .top-nav { padding: 15px 30px; display: flex; gap: 20px; align-items: center; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .search-bar { flex: 1; }
        .search-bar input { width: 100%; box-sizing: border-box; }

        /* MOVIE GRID */
        .grid-container { padding: 30px; }
        #heading { font-size: 24px; margin-bottom: 20px; border-left: 4px solid var(--main-red); padding-left: 15px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .movie-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.4s; border: 1px solid #222; }
        .movie-card:hover { transform: scale(1.05); border-color: var(--main-red); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; }
        .info { padding: 12px; }
        .title { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta { font-size: 10px; color: #777; display: flex; justify-content: space-between; margin-top: 5px; }
        .badge { background: var(--main-red); color: white; padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: bold; }

        /* PLAYER OVERLAY */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; justify-content: center; align-items: center; }
        .player-container { width: 95%; max-width: 1100px; position: relative; }
        .close-btn { position: absolute; top: -50px; right: 0; color: white; font-size: 45px; cursor: pointer; }
        iframe { width: 100%; aspect-ratio: 16/9; border: 1px solid #333; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="#" class="logo" onclick="location.reload()">CINESTREAM PRO</a>
        
        <div class="filter-group">
            <label>Category</label>
            <select id="mediaType" onchange="discover()">
                <option value="movie">Movies</option>
                <option value="tv">Web Series / TV</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Sub-Genre</label>
            <select id="subGenre" onchange="discover()">
                <option value="">Standard Content</option>
                <option value="234193">BL (Boys' Love)</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Origin Country</label>
            <select id="country" onchange="discover()">
                <option value="">Global (All)</option>
                <option value="US">USA (Hollywood)</option>
                <option value="KR">South Korea (K-Drama)</option>
                <option value="TH">Thailand (BL Hub)</option>
                <option value="TR">Turkey (Turkish Drama)</option>
                <option value="JP">Japan (Anime/Movies)</option>
                <option value="CN">China (C-Drama)</option>
                <option value="ES">Spain</option>
                <option value="FR">France</option>
                <option value="IN">India</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Genre</label>
            <select id="genre" onchange="discover()">
                <option value="">All Genres</option>
                <option value="28">Action</option>
                <option value="27">Horror</option>
                <option value="10749">Romance</option>
                <option value="16">Animation</option>
                <option value="878">Sci-Fi</option>
                <option value="35">Comedy</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Year</label>
            <input type="number" id="year" placeholder="e.g. 2024" onchange="discover()">
        </div>

        <div class="filter-group">
            <label>Adult Content</label>
            <select id="adult" onchange="discover()">
                <option value="false">Safe Mode</option>
                <option value="true">Show Adult (18+)</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <div class="search-bar">
                <input type="text" id="query" placeholder="Search Hindi Dubbed content..." onkeyup="if(event.key === 'Enter') search()">
            </div>
        </div>

        <div class="grid-container">
            <h2 id="heading">Hindi Dubbed Trending</h2>
            <div class="movie-grid" id="movieGrid"></div>
        </div>
    </div>

    <div id="player-overlay">
        <div class="player-container">
            <span class="close-btn" onclick="closePlayer()">&times;</span>
            <iframe id="mainPlayer" src="" allowfullscreen frameborder="0"></iframe>
        </div>
    </div>

    <script>
        const KEY = '2ceab4da8be54076a608de05a598d634';
        const IMG = 'https://tmdb.org';

        window.onload = () => discover();

        async function discover() {
            const type = document.getElementById('mediaType').value;
            const country = document.getElementById('country').value;
            const genre = document.getElementById('genre').value;
            const year = document.getElementById('year').value;
            const adult = document.getElementById('adult').value;
            const blKeyword = document.getElementById('subGenre').value;

            let url = `https://themoviedb.org{type}?api_key=${KEY}&sort_by=popularity.desc&include_adult=${adult}&with_spoken_languages=hi`;
            
            if(genre) url += `&with_genres=${genre}`;
            if(blKeyword) url += `&with_keywords=${blKeyword}`;
            if(year) url += type === 'movie' ? `&primary_release_year=${year}` : `&first_air_date_year=${year}`;
            if(country) url += `&with_origin_country=${country}`;

            const res = await fetch(url);
            const data = await res.json();
            render(data.results, type);
            document.getElementById('heading').innerText = `${blKeyword ? 'Hindi BL' : 'Hindi'} ${type === 'movie' ? 'Movies' : 'Series'}`;
        }

        async function search() {
            const q = document.getElementById('query').value;
            const res = await fetch(`https://themoviedb.org{KEY}&query=${encodeURIComponent(q + " hindi")}&include_adult=true`);
            const data = await res.json();
            render(data.results);
            document.getElementById('heading').innerText = `Results for: ${q}`;
        }

        function render(list, forceType = null) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';
            if(!list || list.length === 0) {
                grid.innerHTML = "<p style='padding:20px;'>No Hindi content found.</p>";
                return;
            }
            list.forEach(item => {
                const type = forceType || item.media_type || 'movie';
                if(type === 'person') return;
                const card = document.createElement('div');
                card.classList.add('movie-card');
                card.onclick = () => openPlayer(item.id, type);
                card.innerHTML = `
                    <img src="${item.poster_path ? IMG + item.poster_path : 'https://placeholder.com'}">
                    <div class="info">
                        <div class="title">${item.title || item.name}</div>
                        <div class="meta">
                            <span>${(item.release_date || item.first_air_date || '').split('-')[0]}</span>
                            <span class="badge">HINDI DUB</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openPlayer(id, type) {
            document.getElementById('mainPlayer').src = `https://vidsrc.icu{type}/${id}`;
            document.getElementById('player-overlay').style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('mainPlayer').src = '';
        }

        window.addEventListener('keydown', (e) => { if(e.key === "Escape") closePlayer(); });
    </script>
</body>
</html>
