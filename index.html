<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream | Free Movie Portal</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .movie-card { cursor: pointer; transition: 0.3s; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; border-radius: 8px; }
        #player-container { display: none; margin-bottom: 30px; position: relative; padding-top: 56.25%; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>Trending Movies</h1>
    
    <div id="player-container">
        <iframe id="video-player" src="" allowfullscreen></iframe>
    </div>

    <div class="grid" id="movie-grid"></div>

    <script>
        const API_KEY = 'YOUR_TMDB_API_KEY'; // Get this from themoviedb.org
        const grid = document.getElementById('movie-grid');
        const playerContainer = document.getElementById('player-container');
        const player = document.getElementById('video-player');

        // 1. Fetch Trending Movies
        async function fetchMovies() {
            const res = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`);
            const data = await res.json();
            displayMovies(data.results);
        }

        // 2. Display them in the Grid
        function displayMovies(movies) {
            grid.innerHTML = movies.map(m => `
                <div class="movie-card" onclick="playMovie(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" alt="${m.title}">
                    <p>${m.title}</p>
                </div>
            `).join('');
        }

        // 3. Play Movie using Embed API
        function playMovie(id) {
            // Using vidsrc.to - a popular free embed provider
            player.src = `https://vidsrc.to/embed/movie/${id}`;
            playerContainer.style.display = 'block';
            window.scrollTo(0, 0);
        }

        fetchMovies();
    </script>
</body>
</html>
