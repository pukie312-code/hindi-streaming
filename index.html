<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream | Hindi Dubbed World</title>
    <!-- Google Fonts for Netflix Look -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-red: #e50914;
            --bg-black: #141414;
            --card-bg: #181818;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* NAVIGATION BAR */
        .navbar {
            display: flex;
            align-items: center;
            padding: 20px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, transparent);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            color: var(--main-red);
            font-size: 30px;
            font-weight: bold;
            text-decoration: none;
            margin-right: 30px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            color: #e5e5e5;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: #b3b3b3; }

        /* SEARCH BOX */
        .search-container {
            margin-left: auto;
            display: flex;
            margin-right: 8%;
        }

        .search-container input {
            background: rgba(0,0,0,0.75);
            border: 1px solid white;
            color: white;
            padding: 7px 10px;
            border-radius: 4px;
        }

        /* HERO SECTION (Featured Movie) */
        .hero {
            height: 80vh;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 4%;
            background-image: linear-gradient(to right, #141414, transparent), url('https://image.tmdb.org/t/p/original/mDf935S7C36v2ZqZ8ZpZ296o6S1.jpg');
        }

        .hero-title { font-size: 50px; margin-bottom: 10px; max-width: 500px; }
        .hero-desc { max-width: 500px; font-size: 18px; margin-bottom: 20px; }

        /* VIDEO PLAYER (Modal Overlay) */
        #player-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .player-container {
            width: 90%;
            max-width: 1000px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: -40px; right: 0;
            color: white; font-size: 30px; cursor: pointer;
        }

        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: 2px solid var(--main-red);
            border-radius: 8px;
        }

        /* MOVIE GRID */
        .content-section { padding: 20px 4%; }
        .section-title { font-size: 20px; margin-bottom: 15px; }
        
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .movie-card:hover { transform: scale(1.05); z-index: 2; }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; }
        .movie-card p { padding: 10px; font-size: 14px; margin: 0; text-align: center; }

    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="#" class="logo" onclick="location.reload()">CINESTREAM</a>
        <ul class="nav-links">
            <li><a href="#" onclick="fetchMovies('trending')">Home</a></li>
            <li><a href="#" onclick="fetchMovies('bollywood')">Bollywood</a></li>
            <li><a href="#" onclick="fetchMovies('dubbed')">Hindi Dubbed</a></li>
        </ul>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Movies..." onkeyup="if(event.key === 'Enter') searchMovies()">
        </div>
    </nav>

    <!-- HERO SECTION -->
    <header class="hero" id="hero">
        <h1 class="hero-title" id="heroTitle">Hindi Dubbed World</h1>
        <p class="hero-desc" id="heroDesc">Watch the latest world cinema, dubbed in Hindi for free forever.</p>
    </header>

    <!-- MAIN CONTENT -->
    <div class="content-section">
        <h2 class="section-title" id="listTitle">New Releases</h2>
        <div class="movie-grid" id="movieGrid">
            <!-- Movies will appear here -->
        </div>
    </div>

    <!-- PLAYER OVERLAY -->
    <div id="player-overlay">
        <div class="player-container">
            <span class="close-btn" onclick="closePlayer()">×</span>
            <!-- ONLY 8STREAM SERVER -->
            <iframe id="videoPlayer" src="" allowfullscreen frameborder="0"></iframe>
            <div style="text-align: center; margin-top: 15px; color: #aaa;">
                Server: <b>8Stream.io (Stable)</b> | Tip: Select Hindi Audio in ⚙️ settings.
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR TMDB KEY HERE
        const API_KEY = '2ceab4da8be54076a608de05a598d634'; 
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';

        async function fetchMovies(type) {
            let url = `${BASE_URL}/trending/movie/day?api_key=${API_KEY}&language=hi-IN`;
            document.getElementById('listTitle').innerText = "Trending Now";

            if(type === 'bollywood') {
                url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_original_language=hi&sort_by=popularity.desc&language=hi-IN`;
                document.getElementById('listTitle').innerText = "Top Bollywood Movies";
            }
            if(type === 'dubbed') {
                // Searches for popular Hollywood movies with Hindi language text
                url = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=hi-IN`;
                document.getElementById('listTitle').innerText = "Hindi Dubbed Hits";
            }

            const res = await fetch(url);
            const data = await res.json();
            displayMovies(data.results);
        }

        async function searchMovies() {
            const query = document.getElementById('searchInput').value;
            // The Secret Hack: We add "hindi dubbed" to the hidden search to get better results
            const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query + " hindi dubbed")}&language=hi-IN`);
            const data = await res.json();
            document.getElementById('listTitle').innerText = `Results for: ${query}`;
            displayMovies(data.results);
        }

        function displayMovies(movies) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.classList.add('movie-card');
                card.onclick = () => openPlayer(movie.id);
                card.innerHTML = `
                    <img src="${movie.poster_path ? IMG_URL + movie.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}" alt="${movie.title}">
                    <p>${movie.title}</p>
                `;
                grid.appendChild(card);
            });
        }

        async function openPlayer(tmdbId) {
            // 1. Get IMDB ID first because 8stream loves it
            const res = await fetch(`${BASE_URL}/movie/${tmdbId}?api_key=${API_KEY}`);
            const data = await res.json();
            const imdbId = data.imdb_id;

            if(!imdbId) {
                alert("This movie is not available on 8stream yet.");
                return;
            }

            // 2. Load into 8stream ONLY
            const player = document.getElementById('videoPlayer');
            player.src = `https://8stream.io/embed/${imdbId}`;
            
            // 3. Show the overlay
            document.getElementById('player-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop scrolling
        }

        function closePlayer() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('videoPlayer').src = '';
            document.body.style.overflow = 'auto'; // Enable scrolling
        }

        // Initialize Home Page
        fetchMovies('trending');
    </script>
</body>
</html>
